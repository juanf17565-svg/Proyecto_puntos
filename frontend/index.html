<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#ffffff" />
    <title>Ñandé — Puntos Premium</title>
  </head>
  <body>

    <div x-data="{ menuOpen: false }" x-cloak>

      <div class="navbar-backdrop" x-show="menuOpen" @click="menuOpen = false"></div>

      <nav class="navbar">
        <div class="navbar-inner">

          <a href="#/" class="navbar-logo">
            <img src="/logo.png" alt="Ñandé"
                 onerror="this.style.display='none';this.nextElementSibling.style.display='block'" />
            <span class="navbar-logo-text" style="display:none">Ñandé</span>
          </a>

          <div class="navbar-links">
            <a href="#/" class="navbar-link" :class="$store.router.current === '/' ? 'active' : ''">Catálogo</a>
            <a href="#/cliente" class="navbar-link"
               x-show="$store.auth.user?.rol === 'cliente'"
               :class="$store.router.current === '/cliente' ? 'active' : ''">Mis Puntos</a>
            <a href="#/vendedor" class="navbar-link"
               x-show="$store.auth.user?.rol === 'vendedor' || $store.auth.user?.rol === 'admin'"
               :class="$store.router.current === '/vendedor' ? 'active' : ''">Cargar Puntos</a>
            <a href="#/admin" class="navbar-link"
               x-show="$store.auth.user?.rol === 'admin'"
               :class="$store.router.current === '/admin' ? 'active' : ''">Panel Admin</a>
          </div>

          <div class="navbar-auth">
            <template x-if="$store.auth.user">
              <div class="navbar-user">
                <span class="navbar-points" x-text="($store.auth.user.puntos_saldo ?? 0) + ' pts'"></span>
                <span class="navbar-name" x-text="$store.auth.user.nombre"></span>
                <button class="navbar-logout" @click="$store.auth.logout()">Salir</button>
              </div>
            </template>
            <template x-if="!$store.auth.user">
              <div style="display:flex;align-items:center;gap:0.75rem;">
                <a href="#/login" class="navbar-btn-outline">Iniciar Sesión</a>
                <a href="#/registro" class="navbar-btn-solid">Registrarse</a>
              </div>
            </template>
          </div>

          <button class="navbar-hamburger" @click="menuOpen = !menuOpen" aria-label="Menú">
            <span></span><span></span><span></span>
          </button>
        </div>
      </nav>

      <div class="navbar-mobile" x-show="menuOpen" x-transition>
        <a href="#/" class="navbar-link" :class="$store.router.current === '/' ? 'active' : ''" @click="menuOpen = false">Catálogo</a>
        <a href="#/cliente" class="navbar-link" x-show="$store.auth.user?.rol === 'cliente'" :class="$store.router.current === '/cliente' ? 'active' : ''" @click="menuOpen = false">Mis Puntos</a>
        <a href="#/vendedor" class="navbar-link" x-show="$store.auth.user?.rol === 'vendedor' || $store.auth.user?.rol === 'admin'" :class="$store.router.current === '/vendedor' ? 'active' : ''" @click="menuOpen = false">Cargar Puntos</a>
        <a href="#/admin" class="navbar-link" x-show="$store.auth.user?.rol === 'admin'" :class="$store.router.current === '/admin' ? 'active' : ''" @click="menuOpen = false">Panel Admin</a>
        <div class="navbar-mobile-divider"></div>
        <div class="navbar-mobile-auth">
          <template x-if="$store.auth.user">
            <div class="navbar-mobile-user">
              <div>
                <span class="navbar-name" x-text="$store.auth.user.nombre"></span>
                <span class="navbar-points" style="margin-left:0.5rem" x-text="($store.auth.user.puntos_saldo ?? 0) + ' pts'"></span>
              </div>
              <button class="navbar-logout" @click="$store.auth.logout(); menuOpen = false">Salir</button>
            </div>
          </template>
          <template x-if="!$store.auth.user">
            <div style="display:flex;flex-direction:column;gap:0.5rem;">
              <a href="#/login" class="navbar-mobile-btn navbar-btn-outline" @click="menuOpen = false">Iniciar Sesión</a>
              <a href="#/registro" class="navbar-mobile-btn navbar-btn-solid" @click="menuOpen = false">Registrarse</a>
            </div>
          </template>
        </div>
      </div>
    </div>

    <div id="app" x-data x-cloak class="app-main">
      <main id="views-outlet"></main>
    </div>

    <footer x-data x-cloak class="footer">
      <div class="footer-inner">

        <div class="footer-col footer-col-left">
          <a href="#/" class="footer-logo">
            <img src="/logo.png" alt="Ñandé"
                 onerror="this.style.display='none';this.nextElementSibling.style.display='block'" />
            <span class="footer-logo-text" style="display:none">Ñandé</span>
          </a>
          <p class="footer-tagline">Casa de Alfajores, Dulces y Chocolates</p>
        </div>

        <nav class="footer-col footer-col-center">
          <a href="#/" class="footer-link">Catálogo</a>
          <a href="#/login" class="footer-link" x-show="!$store.auth.user">Iniciar Sesión</a>
          <a href="#/registro" class="footer-link" x-show="!$store.auth.user">Registrarse</a>
          <a href="#/cliente" class="footer-link" x-show="$store.auth.user?.rol === 'cliente'">Mis Puntos</a>
          <a href="#/admin" class="footer-link" x-show="$store.auth.user?.rol === 'admin'">Panel Admin</a>
        </nav>

        <div class="footer-col footer-col-right">
          <div class="footer-socials">
            <a href="https://wa.me/5493794632610" target="_blank" class="social-btn" aria-label="WhatsApp">
              <svg fill="currentColor" viewBox="0 0 24 24" width="26" height="26">
                <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
              </svg>
            </a>
            <a href="https://www.instagram.com/alfajorescorrentinos/" target="_blank" class="social-btn" aria-label="Instagram">
              <svg fill="currentColor" viewBox="0 0 24 24" width="26" height="26">
                <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/>
              </svg>
            </a>
          </div>
        </div>

      </div>
    </footer>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
