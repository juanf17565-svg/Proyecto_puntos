<!-- ── CLIENTE ── -->
<section x-show="$store.router.current === '/cliente'"
         x-data="clienteView"
         class="dashboard-section">
  <h1 class="ios-title mb-4">Tus puntos</h1>

  <!-- Saldo actual -->
  <div class="ios-card p-6 text-center" style="border-top: 4px solid #D4621A;">
    <p class="text-sm font-medium" style="color: #A08060;">Saldo actual</p>
    <p class="text-5xl font-bold tracking-tight mt-2" style="color: #D4621A;"
       x-text="loading ? '—' : (me?.puntos_saldo ?? 0)"></p>
    <p class="text-xs mt-1" style="color: #A08060;">puntos</p>
    <p class="text-xs mt-3" style="color: #A08060;" x-show="me">
      DNI <span x-text="me?.dni"></span>
    </p>
  </div>

  <!-- ── CANJEAR CÓDIGO PROMOCIONAL ── -->
  <p class="ios-label mt-8">Código promocional</p>
  <div class="ios-card p-5" style="border-left: 4px solid #D4621A;">
    <p class="text-sm mb-3" style="color: #6b7280;">
      ¿Tenés un código de puntos? Ingresalo acá para acreditarlos en tu cuenta.
    </p>

    <div style="display: flex; gap: 0.6rem;">
      <input
        type="text"
        class="ios-input"
        style="text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; flex: 1;"
        placeholder="Ej: VERANO24"
        x-model="codigoInput"
        @keydown.enter="canjearCodigo()"
        :disabled="codigoLoading"
      />
      <button
        class="ios-btn-primary"
        style="width: auto; padding: 0 1.25rem; border-radius: 12px; font-size: 0.9rem; white-space: nowrap;"
        @click="canjearCodigo()"
        :disabled="codigoLoading || !codigoInput.trim()"
      >
        <span x-show="!codigoLoading">Canjear</span>
        <span x-show="codigoLoading">…</span>
      </button>
    </div>

    <!-- Mensaje de éxito -->
    <div x-show="codigoOk" x-transition
         style="margin-top: 0.75rem; padding: 0.75rem 1rem; background: #FEF3E8; border: 1.5px solid #F5C8A8; border-radius: 10px; display: flex; align-items: flex-start; gap: 0.5rem;">
      <svg style="width:18px;height:18px;flex-shrink:0;margin-top:1px;color:#D4621A;" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
      </svg>
      <p class="text-sm font-medium" style="color: #D4621A; margin: 0;" x-text="codigoOk"></p>
    </div>

    <!-- Mensaje de error -->
    <div x-show="codigoError" x-transition
         style="margin-top: 0.75rem; padding: 0.75rem 1rem; background: #fff1f2; border: 1.5px solid #fecdd3; border-radius: 10px; display: flex; align-items: flex-start; gap: 0.5rem;">
      <svg style="width:18px;height:18px;flex-shrink:0;margin-top:1px;color:#ef4444;" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z"/>
      </svg>
      <p class="text-sm font-medium" style="color: #ef4444; margin: 0;" x-text="codigoError"></p>
    </div>
  </div>
  <!-- ── TUS CANJES ── -->
  <p class="ios-label mt-8">Mis Canjes (Retiros pendientes)</p>
  <div class="ios-card ios-list">
    <template x-if="loading">
      <div class="ios-row text-sm" style="color: #A08060;"><span>Cargando…</span></div>
    </template>
    <template x-if="!loading && canjes.length === 0">
      <div class="ios-row text-sm" style="color: #A08060;"><span>No tenés canjes realizados aún.</span></div>
    </template>
    <template x-for="c in canjes" :key="c.id">
      <div class="px-4 py-3 border-b border-ios-gray6 last:border-0">
        <div class="flex items-start gap-3">
          <img :src="c.producto_imagen || 'https://via.placeholder.com/48'" 
               class="w-12 h-12 rounded-lg object-cover bg-ios-gray6 flex-shrink-0" />
          <div class="flex-1 min-w-0">
            <p class="text-sm font-semibold truncate" x-text="c.producto_nombre" style="color: #5D3A1A;"></p>
            <div class="flex items-center gap-2 mt-0.5">
              <span class="text-[10px] font-bold px-1.5 py-0.5 rounded-full"
                    :style="{
                      'background': c.estado === 'pendiente' ? '#FEF3E8' : (c.estado === 'entregado' ? '#ECFDF5' : '#FFF1F2'),
                      'color': c.estado === 'pendiente' ? '#D4621A' : (c.estado === 'entregado' ? '#059669' : '#E11D48')
                    }"
                    x-text="c.estado.toUpperCase()"></span>
              <span class="text-[10px]" style="color: #A08060;" x-text="formatDate(c.created_at)"></span>
            </div>
            <p class="text-[10px] mt-1 uppercase font-bold tracking-wider" style="color: #A08060;">
              Código: <span class="text-sm" style="color: #D4621A;" x-text="c.id"></span>
            </p>
          </div>
        </div>
        <template x-if="c.estado === 'pendiente'">
          <div class="mt-2 p-2 rounded-lg text-[10px] leading-tight" style="background: #FDF8F3; color: #A08060; border: 1px dashed #F5C8A8;">
            Retirar antes del: <strong style="color: #D4621A;" x-text="formatDate(c.fecha_limite_retiro)"></strong>
          </div>
        </template>
      </div>
    </template>
  </div>
  <!-- ── MOVIMIENTOS ── -->
  <p class="ios-label mt-8">Movimientos</p>
  <div class="ios-card ios-list">
    <template x-if="loading">
      <div class="ios-row text-sm" style="color: #A08060;"><span>Cargando…</span></div>
    </template>
    <template x-if="!loading && movs.length === 0">
      <div class="ios-row text-sm" style="color: #A08060;"><span>Aún no tenés movimientos.</span></div>
    </template>
    <template x-for="m in movs" :key="m.id">
      <div class="px-4 py-3">
        <div class="flex items-center justify-between">
          <p class="text-base font-medium"
             :style="m.puntos >= 0 ? 'color: #D4621A;' : 'color: #ef4444;'">
            <span x-text="m.puntos >= 0 ? '+' : ''"></span><span x-text="m.puntos"></span> pts
          </p>
          <time class="text-xs" style="color: #A08060;" x-text="formatDate(m.created_at)"></time>
        </div>
        <p class="text-xs mt-0.5" style="color: #A08060;"
           x-text="m.descripcion || m.tipo || ''"></p>
      </div>
    </template>
  </div>
</section>
