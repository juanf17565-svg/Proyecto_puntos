<!-- ── TÉRMINOS Y CONDICIONES ── -->
<section x-show="$store.router.current === '/terminos'"
         x-data="paginaView"
         class="pagina-page">
  <div class="pagina-card">

    <template x-if="loading">
      <div style="text-align:center;padding:3rem;color:#A08060;">Cargando…</div>
    </template>

    <template x-if="error">
      <div style="text-align:center;padding:3rem;color:#ef4444;" x-text="error"></div>
    </template>

    <template x-if="!loading && !error">
      <div>
        <h1 class="pagina-title" x-text="titulo"></h1>
        <div class="pagina-content markdown-body" x-html="html"></div>
      </div>
    </template>

  </div>
</section>
