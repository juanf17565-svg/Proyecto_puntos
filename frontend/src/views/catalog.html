<!-- ── CATÁLOGO (home) ── -->
<section x-show="$store.router.current === '/'"
         x-data="catalogView"
         class="catalog-page">

  <!-- Banner de puntos (solo si está logueado) -->
  <div class="catalog-user-banner" x-show="$store.auth.user">
    <div>
      <p>Hola, <strong x-text="$store.auth.user?.nombre"></strong></p>
      <p style="font-size:0.8rem;color:#A08060;margin-top:0.15rem">
        Tus puntos disponibles
      </p>
    </div>
    <div style="text-align:right">
      <p class="banner-pts" x-text="$store.auth.user?.puntos_saldo ?? 0"></p>
      <p class="banner-pts-label">puntos</p>
    </div>
  </div>

  <!-- Encabezado -->
  <div class="catalog-header">
    <h1 class="catalog-title">Catálogo de productos</h1>
    <p class="catalog-subtitle">Canjeá tus puntos por productos exclusivos Ñandé</p>
  </div>

  <!-- ── FILTROS ── -->
  <div class="catalog-filters" x-show="!loading" x-data="{ dropdownOpen: false }">

    <!-- Dropdown de categoría -->
    <div class="catalog-filter-dropdown" x-show="categorias.length > 0" style="position:relative;">
      <button class="catalog-dropdown-btn"
              @click="dropdownOpen = !dropdownOpen"
              :class="categoriaActiva && 'active'">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="flex-shrink:0"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"/></svg>
        <span x-text="categoriaActiva || 'Categoría'"></span>
        <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"
             style="margin-left:auto;transition:transform 0.2s;"
             :style="dropdownOpen ? 'transform:rotate(180deg)' : ''">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5"/>
        </svg>
      </button>

      <!-- Lista desplegable -->
      <div class="catalog-dropdown-list" x-show="dropdownOpen" x-transition @click.outside="dropdownOpen = false">
        <button class="catalog-dropdown-item" :class="categoriaActiva === '' && 'active'"
                @click="categoriaActiva = ''; dropdownOpen = false">
          Todas las categorías
        </button>
        <template x-for="cat in categorias" :key="cat">
          <button class="catalog-dropdown-item" :class="categoriaActiva === cat && 'active'"
                  @click="categoriaActiva = cat; dropdownOpen = false"
                  x-text="cat">
          </button>
        </template>
      </div>
    </div>

    <!-- Range slider de puntos -->
    <div class="catalog-filter-range">
      <div class="catalog-filter-range-header">
        <label class="catalog-filter-label">Puntos máximos</label>
        <span class="catalog-filter-range-val"
              x-text="maxPuntos ? maxPuntos + ' pts' : 'Sin límite'"></span>
      </div>
      <input type="range" class="catalog-range-slider"
             min="0" :max="puntosMax" step="50"
             x-model="maxPuntos" />
    </div>

    <!-- Botón limpiar -->
    <button class="catalog-filter-clear"
            x-show="categoriaActiva || (maxPuntos && Number(maxPuntos) < puntosMax)"
            @click="limpiarFiltros()">
      ✕ Limpiar
    </button>

  </div>

  <!-- Skeleton loading -->
  <div x-show="loading" class="catalog-grid">
    <template x-for="i in 6" :key="i">
      <div class="product-card">
        <div class="product-card-placeholder">
          <div class="catalog-skeleton" style="width:52px;height:52px;border-radius:50%"></div>
        </div>
        <div class="product-card-body" style="gap:0.5rem;display:flex;flex-direction:column;">
          <div class="catalog-skeleton" style="height:1rem;border-radius:6px"></div>
          <div class="catalog-skeleton" style="height:0.75rem;border-radius:6px;width:65%"></div>
          <div class="catalog-skeleton" style="height:3rem;border-radius:10px;margin-top:0.5rem"></div>
          <div class="catalog-skeleton" style="height:2.5rem;border-radius:10px;margin-top:auto"></div>
        </div>
      </div>
    </template>
  </div>

  <!-- Grid de productos -->
  <div x-show="!loading" class="catalog-grid">

    <!-- Estado vacío -->
    <template x-if="productosFiltrados.length === 0">
      <div class="catalog-empty">
        <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M15.75 10.5V6a3.75 3.75 0 10-7.5 0v4.5m11.356-1.993l1.263 12c.07.665-.45 1.243-1.119 1.243H4.25a1.125 1.125 0 01-1.12-1.243l1.264-12A1.125 1.125 0 015.513 7.5h12.974c.576 0 1.059.435 1.119 1.007z" />
        </svg>
        <h3>Sin productos disponibles</h3>
        <p x-text="(categoriaActiva || maxPuntos) ? 'Probá con otros filtros' : 'Volvé pronto para ver las novedades'"></p>
      </div>
    </template>

    <template x-for="p in productosFiltrados" :key="p.id">
      <div class="product-card">

        <!-- Imagen o placeholder -->
        <template x-if="p.imagen_url">
          <img :src="p.imagen_url" :alt="p.nombre" class="product-card-img" />
        </template>
        <template x-if="!p.imagen_url">
          <div class="product-card-placeholder">
            <svg fill="none" stroke="currentColor" stroke-width="1.2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M2.25 15.75l5.159-5.159a2.25 2.25 0 013.182 0l5.159 5.159m-1.5-1.5l1.409-1.409a2.25 2.25 0 013.182 0l2.909 2.909m-18 3.75h16.5a1.5 1.5 0 001.5-1.5V6a1.5 1.5 0 00-1.5-1.5H3.75A1.5 1.5 0 002.25 6v12a1.5 1.5 0 001.5 1.5zm10.5-11.25h.008v.008h-.008V8.25zm.375 0a.375.375 0 11-.75 0 .375.375 0 01.75 0z" />
            </svg>
          </div>
        </template>

        <!-- Categoría badge -->
        <template x-if="p.categoria">
          <span class="product-card-cat" x-text="p.categoria"></span>
        </template>

        <!-- Cuerpo de la card -->
        <div class="product-card-body">
          <p class="product-card-name" x-text="p.nombre"></p>
          <p class="product-card-desc"
             x-text="p.descripcion || 'Producto disponible para canje con tus puntos.'"></p>

          <!-- Información de puntos -->
          <div class="product-card-points">
            <div class="product-card-row">
              <span>Puntos para canjear</span>
              <span class="cost" x-text="p.puntos_requeridos + ' pts'"></span>
            </div>
            <template x-if="p.puntos_acumulables">
              <div>
                <div class="product-card-divider"></div>
                <div class="product-card-row" style="margin-top:0.4rem">
                  <span>Puntos que sumás al comprar</span>
                  <span class="earn" x-text="'+' + p.puntos_acumulables + ' pts'"></span>
                </div>
              </div>
            </template>
          </div>

          <!-- Botón CTA -->
          <template x-if="$store.auth.user">
            <button class="product-card-btn product-card-btn-canjear"
                    @click="canjear(p)">
              Canjear producto
            </button>
          </template>
          <template x-if="!$store.auth.user">
            <a href="#/login" class="product-card-btn product-card-btn-login">
              Iniciar sesión para canjear
            </a>
          </template>
        </div>
      </div>
    </template>
  </div>
</section>
