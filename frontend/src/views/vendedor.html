<!-- ── VENDEDOR ── -->
<section x-show="$store.router.current === '/vendedor'"
         x-data="vendedorView"
         class="dashboard-section">
  <h1 class="ios-title mb-4">Cargar puntos</h1>

  <p class="ios-label">Cliente</p>
  <div class="ios-card p-4 space-y-3">
    <div style="position:relative">
      <input class="ios-input" placeholder="Nombre o DNI del cliente..." x-model="queryCliente"
             @input.debounce.300ms="buscarClientesRealTime()"
             @keydown.escape="resultadosClientes = []" />

      <!-- Recomendaciones en tiempo real -->
      <div x-show="resultadosClientes.length > 0"
           class="ios-card"
           style="position:absolute; top:calc(100% + 4px); left:0; right:0; z-index:50; max-height:200px; overflow-y:auto; box-shadow: 0 8px 25px rgba(0,0,0,0.15); border:1px solid #F0DBC5;">
        <template x-for="u in resultadosClientes" :key="u.id">
          <button type="button"
                  @click="seleccionarCliente(u)"
                  class="w-full text-left p-4 hover:bg-[#FEF3E8] active:bg-[#F5E6D3] border-b border-[#F0DBC5] last:border-0 flex flex-col transition">
            <span class="font-semibold text-sm" style="color: #3D1A02;" x-text="u.nombre"></span>
            <span class="text-xs" style="color: #A08060;" x-text="'DNI: ' + u.dni + ' · ' + u.puntos + ' pts'"></span>
          </button>
        </template>
      </div>
    </div>

    <template x-if="cliente">
      <div class="rounded-xl bg-[#FEF3E8] p-4 border border-[#F5C8A8]">
        <div class="flex justify-between items-center">
          <div>
            <p class="text-base font-bold" style="color: #D4621A;" x-text="cliente.nombre"></p>
            <p class="text-xs" style="color: #A08060;">
              DNI <span x-text="cliente.dni"></span> ·
              <span class="font-bold" style="color: #D4621A;" x-text="cliente.puntos"></span> puntos disponibles
            </p>
          </div>
          <button @click="cliente = null; queryCliente = ''" class="bg-white px-3 py-1.5 rounded-lg text-[#D4621A] text-xs font-bold border border-[#F5C8A8] shadow-sm">Cambiar</button>
        </div>
      </div>
    </template>
  </div>

  <p class="ios-label mt-6">Catálogo</p>
  <input class="ios-input mb-2" placeholder="Buscar producto…" x-model="filtro" />
  <div class="ios-card ios-list max-h-80 overflow-y-auto">
    <template x-if="productosFiltrados.length === 0">
      <div class="ios-row text-ios-secondary text-sm"><span>Sin productos.</span></div>
    </template>
    <template x-for="p in productosFiltrados" :key="p.id">
      <button type="button" @click="add(p)"
              class="w-full text-left ios-row hover:bg-[#FEF3E8] active:bg-[#F5E6D3] transition">
        <div class="min-w-0">
          <p class="text-base font-medium truncate" x-text="p.nombre"></p>
          <p class="text-xs" style="color: #A08060;">
            +<span x-text="p.puntos_acumulables || 0"></span> pts c/u
          </p>
        </div>
        <span class="text-[#D4621A] text-xl leading-none">+</span>
      </button>
    </template>
  </div>

  <template x-if="cartItems.length > 0">
    <div>
      <p class="ios-label mt-6">Carrito</p>
      <div class="ios-card ios-list">
        <template x-for="it in cartItems" :key="it.id">
          <div class="ios-row">
            <div class="min-w-0">
              <p class="text-base font-medium truncate" x-text="it.nombre"></p>
              <p class="text-xs text-ios-secondary">
                +<span x-text="it.subtotal_puntos"></span> pts
              </p>
            </div>
            <div class="flex items-center gap-2 shrink-0">
              <button type="button" class="w-8 h-8 rounded-full bg-ios-gray5 text-ios-blue font-bold" @click="dec(it.id)">−</button>
              <span class="w-6 text-center font-medium" x-text="it.cantidad"></span>
              <button type="button" class="w-8 h-8 rounded-full bg-ios-gray5 text-ios-blue font-bold" @click="inc(it.id)">+</button>
            </div>
          </div>
        </template>
      </div>
      <div class="ios-card mt-3 p-4 flex items-center justify-between">
        <div>
          <p class="text-xs text-ios-secondary">Puntos Totales a Cargar</p>
        </div>
        <div class="text-right">
          <p class="text-xs text-ios-secondary">Puntos</p>
          <p class="text-xl font-bold text-ios-green">+<span x-text="totalPuntos"></span></p>
        </div>
      </div>
    </div>
  </template>

  <div class="mt-6 space-y-3">
    <input class="ios-input" placeholder="Descripción (opcional)" x-model="descripcion" :disabled="!cliente" />
    <p class="text-ios-red text-sm" x-show="error" x-text="error"></p>
    <p class="text-ios-green text-sm font-medium" x-show="ok" x-text="ok"></p>
    <button type="button" class="ios-btn-primary"
            :disabled="busy || !cliente || cartItems.length === 0"
            @click="confirmar">
      <span x-show="!busy">Cargar puntos</span>
      <span x-show="busy">Cargando…</span>
    </button>
    <button type="button" x-show="cartItems.length > 0" class="ios-btn-secondary" @click="clear">
      Vaciar carrito
    </button>
  </div>
</section>
