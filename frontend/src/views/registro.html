<!-- ── REGISTRO ── -->
<section x-show="$store.router.current === '/registro'"
         x-data="registroForm"
         class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <img src="/logo.png" alt="Ñandé"
           onerror="this.style.display='none';this.nextElementSibling.style.display='block'" />
      <span class="navbar-logo-text" style="display:none;font-size:1.5rem">Ñandé</span>
    </div>
    <h1 class="login-heading">¡Crear cuenta!</h1>
    <p class="login-subheading">Registrate como cliente para acumular puntos</p>
    <form @submit.prevent="submit">
      <!-- Nombre -->
      <label class="login-field-label">Nombre completo</label>
      <div class="login-input-group">
        <span class="login-input-icon">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z" />
          </svg>
        </span>
        <input type="text" class="login-input" placeholder="Tu nombre" x-model="nombre" required autocomplete="name" />
      </div>
      <!-- DNI -->
      <label class="login-field-label">DNI</label>
      <div class="login-input-group">
        <span class="login-input-icon">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 9h3.75M15 12h3.75M15 15h3.75M4.5 19.5h15a2.25 2.25 0 002.25-2.25V6.75A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25v10.5A2.25 2.25 0 004.5 19.5zm6-10.125a1.875 1.875 0 11-3.75 0 1.875 1.875 0 013.75 0zm1.294 6.336a6.721 6.721 0 01-3.17.789 6.721 6.721 0 01-3.168-.789 3.376 3.376 0 016.338 0z" />
          </svg>
        </span>
        <input type="text" class="login-input" placeholder="12345678" x-model="dni" required inputmode="numeric" />
      </div>
      <!-- Email -->
      <label class="login-field-label">Correo electrónico</label>
      <div class="login-input-group">
        <span class="login-input-icon">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75" />
          </svg>
        </span>
        <input type="email" class="login-input" placeholder="tu@email.com" x-model="email" required autocomplete="email" />
      </div>
      <!-- Contraseña -->
      <label class="login-field-label">Contraseña</label>
      <div class="login-input-group">
        <span class="login-input-icon">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z" />
          </svg>
        </span>
        <input :type="showPassword ? 'text' : 'password'" class="login-input login-input-password" placeholder="Mínimo 6 caracteres" x-model="password" required />
        <button type="button" class="login-input-toggle" @click="showPassword = !showPassword">
          <span x-show="!showPassword"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" /><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg></span>
          <span x-show="showPassword"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88" /></svg></span>
        </button>
      </div>
      <!-- Confirmar contraseña -->
      <label class="login-field-label">Confirmar contraseña</label>
      <div class="login-input-group">
        <span class="login-input-icon">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75m-3-7.036A11.959 11.959 0 013.598 6 11.99 11.99 0 003 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285z" />
          </svg>
        </span>
        <input :type="showConfirmPassword ? 'text' : 'password'" class="login-input login-input-password" placeholder="Repetí tu contraseña" x-model="confirmPassword" required />
        <button type="button" class="login-input-toggle" @click="showConfirmPassword = !showConfirmPassword">
          <span x-show="!showConfirmPassword"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" /><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg></span>
          <span x-show="showConfirmPassword"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88" /></svg></span>
        </button>
      </div>
      <!-- Código de invitación -->
      <label class="login-field-label" style="display:flex;align-items:center;gap:0.4rem">
        Código de invitación
        <span style="font-size:0.75rem;font-weight:400;color:#9ca3af">(opcional)</span>
      </label>
      <div class="login-input-group">
        <span class="login-input-icon">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21 11.25v8.25a1.5 1.5 0 01-1.5 1.5H5.25a1.5 1.5 0 01-1.5-1.5v-8.25M12 4.875A2.625 2.625 0 109.375 7.5H12m0-2.625V7.5m0-2.625A2.625 2.625 0 1114.625 7.5H12m0 0V21m-8.625-9.75h18c.621 0 1.125-.504 1.125-1.125v-1.5c0-.621-.504-1.125-1.125-1.125h-18c-.621 0-1.125.504-1.125 1.125v1.5c0 .621.504 1.125 1.125 1.125z" />
          </svg>
        </span>
        <input type="text" class="login-input" placeholder="Ej: ABC12345" x-model="codigoInvitacion" autocomplete="off" style="text-transform:uppercase" />
      </div>
      <!-- Errores -->
      <p class="login-error" x-show="localError" x-text="localError"></p>
      <p class="login-error" x-show="$store.auth.error" x-text="$store.auth.error"></p>
      <button type="submit" class="login-btn-primary" :disabled="$store.auth.loading">
        <span x-show="!$store.auth.loading">Crear cuenta →</span>
        <span x-show="$store.auth.loading">Creando…</span>
      </button>
    </form>
    <div class="login-divider">o registrate con</div>
    <button type="button" class="login-btn-google">
      <svg width="20" height="20" viewBox="0 0 48 48">
        <path fill="#4285F4" d="M44.5 20H24v8.5h11.8C34.7 33.9 30.1 37 24 37c-7.2 0-13-5.8-13-13s5.8-13 13-13c3.1 0 5.9 1.1 8.1 2.9l6.4-6.4C34.6 4.1 29.6 2 24 2 11.8 2 2 11.8 2 24s9.8 22 22 22c11 0 21-8 21-22 0-1.3-.2-2.7-.5-4z"/>
        <path fill="#34A853" d="M6.3 14.7l7 5.1C15.2 16.7 19.3 14 24 14c3.1 0 5.9 1.1 8.1 2.9l6.4-6.4C34.6 4.1 29.6 2 24 2 16.3 2 9.7 6.4 6.3 14.7z"/>
        <path fill="#FBBC05" d="M24 46c5.9 0 10.9-2 14.5-5.3l-6.7-5.5C29.8 37 27 38 24 38c-6.1 0-11.3-4-13.2-9.6l-7 5.4C7.5 42.1 15.2 46 24 46z"/>
        <path fill="#EA4335" d="M46 24c0-1.3-.2-2.7-.5-4H24v8.5h11.8c-1 3.2-3.2 5.9-6.2 7.6l6.7 5.5C40.9 38.3 46 32 46 24z"/>
      </svg>
      Continuar con Google
    </button>
    <p class="login-footer">¿Ya tenés cuenta? <a href="#/login">Iniciá sesión</a></p>
  </div>
</section>
